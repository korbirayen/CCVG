name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CC Version Guard ${{ github.ref_name }}'
          releaseBody: |
            ## CC Version Guard ${{ github.ref_name }}

            Download the installer below:
            - **`CC.Version.Guard_x64-setup.exe`** — Windows installer (recommended)
            - **`CC.Version.Guard_x64_en-US.msi`** — Windows MSI package

            > CapCut is a trademark of ByteDance Ltd. See [LEGAL_DISCLAIMER.md](https://github.com/${{ github.repository }}/blob/main/LEGAL_DISCLAIMER.md) for full terms.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
